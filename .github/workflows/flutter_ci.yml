name: Flutter CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  flutter-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Hello World

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: |
          if [ -d test ]; then
            flutter test
          else
            echo "No test directory found; skipping flutter test."
          fi
